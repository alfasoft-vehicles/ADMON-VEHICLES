<div class="main-container">
  <div class="title-container">
    <h1 class="title">Operaciones Generales de Vehículos</h1>
  </div>

  <div class="operations-grid-container">
    <div class="cards-grid">
      <button 
        class="operation-card" 
        matRipple 
        *ngFor="let item of options" 
        (click)="selectOption(item.actionCode)">
        
        <div class="icon-container">
          <mat-icon>{{ item.icon }}</mat-icon>
        </div>
        <div class="card-content">
          <span class="card-label">{{ item.name }}</span>
        </div>
        <mat-icon class="chevron-icon">chevron_right</mat-icon>
      </button>
    </div>
  </div>
</div>

<app-operaciones-entrega-vehiculo-conductor *ngIf="entregaVehiculoConductor" (close)="hideModal()"></app-operaciones-entrega-vehiculo-conductor>
